<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hidden video element for camera -->
    <video id="cameraVideo" autoplay playsinline style="display: none;"></video>
    
    <!-- Main App Container -->
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1 class="header-title">My Notes</h1>
            <div class="header-actions">
                <button id="btnSearch" class="icon-btn" title="Search">🔍</button>
                <button id="btnSettings" class="icon-btn" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- Search Bar (Hidden by default) -->
        <div id="searchBar" class="search-bar" style="display: none;">
            <input type="text" id="searchInput" class="search-input" placeholder="Search notes or enter secret code...">
            <button id="btnCloseSearch" class="icon-btn">✕</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Notes List Screen -->
            <div id="screenNotesList" class="screen active">
                <div class="notes-list" id="notesList">
                    <!-- Notes will be inserted here by JavaScript -->
                </div>
                <button id="btnAddNote" class="fab-btn" title="Add Note">+</button>
            </div>

            <!-- Note Editor Screen -->
            <div id="screenNoteEditor" class="screen">
                <div class="editor-header">
                    <button id="btnBackEditor" class="icon-btn">←</button>
                    <span class="editor-title">Edit Note</span>
                    <button id="btnSaveNote" class="icon-btn">✓</button>
                </div>
                <div class="editor-body">
                    <input type="text" id="noteTitle" class="note-title-input" placeholder="Note title">
                    <textarea id="noteContent" class="note-content-input" placeholder="Start writing..."></textarea>
                </div>
            </div>

            <!-- Settings Screen -->
            <div id="screenSettings" class="screen">
                <div class="editor-header">
                    <button id="btnBackSettings" class="icon-btn">←</button>
                    <span class="editor-title">Settings</span>
                </div>
                <div class="settings-body">
                    <div class="settings-section">
                        <h3 class="settings-heading">General</h3>
                        <div class="settings-item">
                            <span>Dark Mode</span>
                            <label class="toggle">
                                <input type="checkbox" id="toggleDarkMode">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="settings-item">
                            <span>Notifications</span>
                            <label class="toggle">
                                <input type="checkbox" checked>
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3 class="settings-heading">About</h3>
                        <div class="settings-item">
                            <span>Version</span>
                            <span class="text-muted">3.0.1</span>
                        </div>
                        <div class="settings-item">
                            <span>Storage Used</span>
                            <span class="text-muted">2.4 MB</span>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3 class="settings-heading">Data</h3>
                        <div class="settings-item clickable" id="btnExportNotes">
                            <span>Export Notes</span>
                            <span>→</span>
                        </div>
                        <div class="settings-item clickable">
                            <span>Import Notes</span>
                            <span>→</span>
                        </div>
                        <div class="settings-item clickable">
                            <span>Clear All Notes</span>
                            <span>→</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Hidden Audio (for background keep-alive) -->
    <audio id="keepAliveAudio" loop>
        <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQwAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIADAwMDAwMDAwMDAwMDAwMDAwMDAwMDV1dXV1dXV1dXV1dXV1dXV1dXV1dXV1dXV6urq6urq6urq6urq6urq6urq6urq6v////////////////////////////////8AAAAAAAAAAAAAAAAAAAAAAAAAAAA=" type="audio/mpeg">
    </audio>

    <script src="app.js"></script>
</body>
</html>
